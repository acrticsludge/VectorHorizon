<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0e0e10"/>
  <g transform="translate(16,16) scale(0.7)" stroke="#e5e1e4" stroke-width="1.5" fill="none" stroke-linejoin="round">
    <!-- Isometric cube representing 3D worlds -->
    <polygon points="0,-10 8.66,-5 0,0 -8.66,-5" fill="rgba(229,225,228,0.15)"/>
    <polygon points="0,0 8.66,-5 8.66,5 0,10" fill="rgba(229,225,228,0.08)"/>
    <polygon points="0,0 -8.66,-5 -8.66,5 0,10" fill="rgba(229,225,228,0.05)"/>
    <!-- Inner dot for "horizon" accent -->
    <circle cx="0" cy="0" r="1.5" fill="#e5e1e4" stroke="none"/>
  </g>
</svg>
